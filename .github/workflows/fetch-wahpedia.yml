name: Fetch Wahapedia Data

on:
  schedule:
    - cron: "0 21 * * *" # daily 09:00 UTC
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Wahapedia CSVs and convert to JSON (no Python)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp data

          BASE="https://wahapedia.ru/wh40k10ed"

          fetch_csv () {
            local url="$1"
            local out="$2"
            echo "== Fetching: $url"
            curl -fSsL --compressed \
              --retry 8 --retry-delay 5 --retry-all-errors \
              -A "40k-calculator/1.0 (+github actions)" \
              -H "Accept: text/plain,*/*" \
              "$url" -o "$out"

            # If we got HTML, we're blocked or errored
            if head -c 400 "$out" | grep -qiE '<!doctype|<html|cloudflare|access denied'; then
              echo "ERROR: Got HTML/block page, not CSV: $url"
              head -n 30 "$out" || true
              exit 1
            fi

            # Must look pipe-delimited
            if ! head -n 5 "$out" | grep -q '|'; then
              echo "ERROR: Not pipe-delimited CSV: $url"
              head -n 30 "$out" || true
              exit 1
            fi
          }

          fetch_csv "$BASE/Datasheets.csv"          "tmp/Datasheets.csv"
          fetch_csv "$BASE/Datasheets_models.csv"   "tmp/Datasheets_models.csv"
          fetch_csv "$BASE/Datasheets_wargear.csv"  "tmp/Datasheets_wargear.csv"
          fetch_csv "$BASE/Factions.csv"            "tmp/Factions.csv"

          node <<'NODE'
          const fs = require("fs");

          function stripBom(s){ return s.replace(/^\uFEFF/, ""); }

          // Reads the actual header row from the CSV — never assumes column order
          function parsePipe(raw) {
            raw = stripBom(raw);
            const lines = raw.split(/\r?\n/).filter(l => l.trim().length);
            if (lines.length < 2) return [];
            const headers = lines[0].split("|").map(h => h.trim());
            const out = [];
            for (let r = 1; r < lines.length; r++) {
              const cols = lines[r].split("|");
              const row = {};
              for (let i = 0; i < headers.length; i++) {
                row[headers[i]] = (cols[i] ?? "").trim();
              }
              out.push(row);
            }
            return out;
          }

          const datasheets = parsePipe(fs.readFileSync("tmp/Datasheets.csv","utf8"));
          const models     = parsePipe(fs.readFileSync("tmp/Datasheets_models.csv","utf8"));
          const wargear    = parsePipe(fs.readFileSync("tmp/Datasheets_wargear.csv","utf8"));
          const factions   = parsePipe(fs.readFileSync("tmp/Factions.csv","utf8"));

          // Log actual headers so we can see them in the Actions log
          console.log("Datasheets headers:", Object.keys(datasheets[0] || {}).join(", "));
          console.log("Models headers:",     Object.keys(models[0]     || {}).join(", "));
          console.log("Wargear headers:",    Object.keys(wargear[0]    || {}).join(", "));
          console.log("Factions headers:",   Object.keys(factions[0]   || {}).join(", "));

          // Hard fail if we somehow parsed nothing
          const sample = datasheets.find(d => d.id && d.name);
          if (!sample) {
            console.error("ERROR: datasheets parsed but produced no {id,name}. Aborting.");
            process.exit(1);
          }

          fs.mkdirSync("data", { recursive: true });

          // These filenames match what the app expects:
          fs.writeFileSync("data/datasheets.json", JSON.stringify(datasheets), "utf8");
          fs.writeFileSync("data/models.json", JSON.stringify(models), "utf8");
          fs.writeFileSync("data/weapons.json", JSON.stringify(wargear), "utf8"); // wargear output -> weapons.json for frontend
          fs.writeFileSync("data/factions.json", JSON.stringify(factions), "utf8");

          // Helpful for debugging on the site:
          fs.writeFileSync("data/build-summary.json", JSON.stringify({
            generatedAt: new Date().toISOString(),
            datasheets: datasheets.length,
            models: models.length,
            weapons: wargear.length,
            factions: factions.length,
            sampleUnit: sample.name
          }, null, 2), "utf8");

          console.log("Wrote JSON:",
            datasheets.length, "datasheets |",
            models.length, "models |",
            wargear.length, "weapons |",
            factions.length, "factions"
          );
          NODE

      - name: Commit updated data files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update Wahapedia data [$(date -u +%Y-%m-%d)]"
            git push
          fi
